name: Build and Push Docker Image
run-name: ${{ github.actor }} ran Build and Push

on:
  push:
    branches:
      - main

jobs:
  build_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      actions: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AWS_SHARED_SERVICES_ACCOUNT_ID: ${{ vars.AWS_SHARED_SERVICES_ACCOUNT_ID || '560167829275' }}
      CODEARTIFACT_DOMAIN: ${{ vars.CODEARTIFACT_DOMAIN || 'mentor-forge' }}
      CODEARTIFACT_NPM_REPO: ${{ vars.CODEARTIFACT_NPM_REPO || 'mentorhub-npm' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_READ }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get CodeArtifact npm token
        id: ca_npm
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain "${CODEARTIFACT_DOMAIN}" \
            --domain-owner "${AWS_SHARED_SERVICES_ACCOUNT_ID}" \
            --query authorizationToken --output text)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/mentor-forge/mentorhub_mentor_spa:latest
          secrets: |
            codeartifact_token=${{ steps.ca_npm.outputs.token }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
