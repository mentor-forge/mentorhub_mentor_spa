name: Build and Push Docker Image
run-name: ${{ github.actor }} ran Build and Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - closed
jobs:
  build_push:
    # Node for the SPA build comes from Dockerfile (e.g. node:24-alpine), not the runner.
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # BuildKit cache backend (cache-to: type=gha) writes workflow cache entries
      actions: write
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          # Multi-arch for contributors and hosts on amd64 or arm64 (e.g. Apple silicon).
          # arm64 is built with QEMU on ubuntu-latest — that dominates time; keep everything
          # else lean: committed lockfile + Dockerfile cache mounts + GHA BuildKit cache below.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/agile-learning-institute/mentorhub_sample_spa:latest
          # spa_utils is installed from git; token rewrites https://github.com/ for private library repos. Public spa_utils needs no token.
          build-args: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
